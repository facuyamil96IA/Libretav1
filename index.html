<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal Pro | Minimalist Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Texturas de fondo -->
        <div class="paper-texture"></div>
        <div class="dot-grid"></div>

        <!-- Menú Lateral de Notas -->
        <div id="sidebar" class="sidebar">
            <div class="menu-content">
                <div class="menu-header">
                    <span class="menu-label">MEMORIAS</span>
                    <button id="closeMenu" class="icon-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div id="menuList" class="menu-list">
                    <!-- Las notas se cargan aquí desde JS -->
                </div>
            </div>
        </div>

        <!-- Cabecera Superior -->
        <header id="appHeader">
            <button id="openMenu" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="header-center">
                <span id="dateDisplay" class="date-label"></span>
                <input type="text" id="noteTitle" class="title-input" placeholder="Sin título">
            </div>
            <button id="newNote" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </header>

        <!-- Zona Principal (Escritura y Dibujo) -->
        <main id="container">
            <div class="margin-line"></div>
            <textarea id="journalText" placeholder="Escribe con libertad..."></textarea>
            <canvas id="drawingCanvas" class="inactive"></canvas>
        </main>

        <!-- Navegación Flotante Glassmorphism -->
        <nav class="floating-nav">
            <!-- Selector de Herramientas (visible en modo dibujo) -->
            <div id="drawingTools" class="drawing-tools hidden">
                <div class="palette">
                    <div class="color-dot active" data-color="#3e3e3e" style="background: #3e3e3e;"></div>
                    <div class="color-dot" data-color="#e74c3c" style="background: #e74c3c;"></div>
                    <div class="color-dot" data-color="#3498db" style="background: #3498db;"></div>
                    <div class="color-dot" data-color="#f1c40f" style="background: #f1c40f;"></div>
                    <div class="color-dot" data-color="#9b59b6" style="background: #9b59b6;"></div>
                    <div class="color-dot" data-color="#e67e22" style="background: #e67e22;"></div>
                </div>
                <div class="brush-selector">
                    <button id="setPen" class="tool-btn active">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg>
                    </button>
                    <button id="setPencil" class="tool-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </button>
                    <div class="separator"></div>
                    <button id="undoBtn" class="tool-btn" style="opacity: 1;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Barra de Acciones Principal -->
            <div class="action-bar">
                <div class="nav-item">
                    <button id="toggleDraw" class="nav-circle">
                        <svg id="drawIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg>
                        <svg id="textIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
                    </button>
                </div>
                <div class="nav-item">
                    <button id="saveNote" class="nav-circle glass-solid">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    </button>
                </div>
                <div class="nav-item">
                    <button id="deleteNote" class="nav-circle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            </div>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
